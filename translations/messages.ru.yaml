landing:
    title: "EasyShop — Оптимальные маршруты для магазинов и складов"
    description: "EasyShop строит оптимальные маршруты по магазину или складу. Для покупателей, курьеров, сборщиков заказов и мерчендайзеров."
    nav:
        features: "Возможности"
        ai: "AI-помощник"
        maps: "Карты"
        warehouse: "Склад"
        business: "Для бизнеса"
    hero:
        offer: "Сократите время в магазине на 30-40% — с первого же похода"
        h1: "Оптимальный маршрут — меньше шагов, больше результата"
        p: "EasyShop использует алгоритм оптимизации маршрутов, чтобы вы проходили магазин или склад по кратчайшему пути. Никаких лишних кругов — только нужные товары в правильном порядке."
    features:
        h2: "Как это работает?"
        p: "Три шага до оптимального маршрута"
        step1_title: "Составьте список"
        step1_p: "Импортируйте список товаров с телефона или просто напишите запрос AI-ассистенту — он сам подберёт нужные позиции."
        step2_title: "Оптимальный маршрут"
        step2_p: "Алгоритм рассчитывает кратчайший путь через все нужные отделы с учётом препятствий — как GPS, только для торгового зала."
        step3_title: "Экономьте время"
        step3_p: "Забудьте о хаотичных перемещениях. Проходите магазин по оптимальному пути — экономия <strong>5-15 минут</strong> на каждый визит, до <strong>40% меньше шагов</strong>."
    ai:
        badge: "AI-помощник"
        h2: "Просто напишите — AI сам составит список"
        p: "Не нужно вручную искать каждый товар. Напишите AI-ассистенту что хотите купить или приготовить — он подберёт нужные позиции из каталога магазина. Список товаров также можно импортировать с телефона."
        example1_user: "Хочу приготовить плов на 4 человека"
        example1_bot: "Подобрал: рис 1 кг, баранина 800 г, морковь, лук, специи для плова. Построить маршрут по магазину?"
        example2_user: "Нужны продукты для завтрака на неделю"
        example2_bot: "Составил список: яйца, овсянка, молоко, хлеб, масло, творог, фрукты. Показать маршрут?"
    maps:
        h2: "Интерактивные карты магазинов"
        p: "Ориентируйтесь в любом гипермаркете как у себя дома"
        card1_title: "Карта магазина"
        card1_p: "Интерактивная схема торгового зала поможет мгновенно найти нужный товар или целую категорию — без блужданий по рядам."
        card2_title: "Поиск по карте"
        card2_p: "Введите название товара или категории — и карта сразу покажет, где именно это находится в магазине."
        card3_title: "Тематические подборки"
        card3_p: "Готовые наборы к праздникам и особым случаям: Новый год, день рождения, пикник. Выберите подборку — и маршрут по магазину уже готов!"
    benefits:
        h2: "Преимущества регистрации"
        p: "Персонализация, история покупок и контроль расходов — всё в одном аккаунте"
        card1_title: "Персональный AI-контекст"
        card1_p: "AI-помощник учитывает ваши предпочтения: непереносимость лактозы, вегетарианство, любовь к органике. Один раз укажите — и каждый раз получайте рекомендации именно для себя."
        card2_title: "История покупок и маршрутов"
        card2_p: "Все ваши запросы, маршруты и покупки сохраняются. Легко вернуться к прошлым спискам или повторить удачный заказ — не нужно помнить, что покупали месяц назад."
        card3_title: "Свои подборки товаров"
        card3_p: "Создавайте личные подборки: \"Завтрак на неделю\", \"Продукты для пикника\", \"Детское питание\". Они сохраняются в вашем профиле и доступны в любом магазине сети."
        card4_title: "Статистика расходов"
        card4_p: "Видьте, сколько потратили за маршрут и в целом. Средний чек, частота покупок, экономия времени — полная аналитика ваших походов в магазин."
        cta: "Зарегистрироваться бесплатно"
    advantages:
        h2: "Умный шоппинг в вашем кармане"
        p: "Мы поддерживаем крупнейшие гипермаркеты города. Интерактивные карты, AI-ассистент и праздничные подборки — всё для того, чтобы поход в магазин был быстрым и приятным."
    warehouse:
        h2: "Для складов и внутренней логистики"
        p: "Оптимальные маршруты работают не только в магазинах — но и на любом складе"
        intro: "Если у вас есть склад с товарами на полках — EasyShop поможет вашим сотрудникам двигаться по кратчайшему пути. Загрузите план склада, расставьте товары по зонам и получите готовый инструмент для оптимизации перемещений."
        card1_title: "Курьеры и сборщики заказов"
        card1_p: "Алгоритм строит оптимальный маршрут сбора заказа по складу или торговому залу. Сборщик проходит минимальное расстояние — <strong>+25-35% заказов в час</strong>, очереди не накапливаются."
        card2_title: "Мерчендайзеры"
        card2_p: "Нужно быстро найти где что лежит? Мерчендайзер вводит список позиций — и получает маршрут обхода по залу. Никаких блужданий, только нужные полки в правильном порядке."
        card3_title: "Любой склад или магазин"
        card3_p: "Загрузите план помещения, укажите расположение товаров — и система готова к работе. Подходит для розничных магазинов, складов интернет-магазинов и распределительных центров."
    business:
        h2: "Для ритейлеров и управляющих"
        p: "Привлекайте покупателей уникальным сервисом. Зарегистрированные пользователи выбирают магазины в EasyShop — потому что там удобнее, быстрее и есть персонализация."
        highlight_title: "Почему покупатели выберут ваш магазин?"
        highlight_p: "Пользователи EasyShop сохраняют свои предпочтения, историю покупок и подборки. Но всё это работает только в зарегистрированных магазинах. <strong>Ваша регистрация = конкурентное преимущество</strong>. Покупатель придёт туда, где его знают и где уже настроен персональный AI-помощник."
        card1_title: "Персонализация привлекает клиентов"
        card1_p: "Покупатели ценят AI, который помнит их диету и предпочтения. Если ваш магазин есть в системе — клиент получает персональные рекомендации. Конкуренты без EasyShop такого предложить не могут."
        card2_title: "История покупок удерживает"
        card2_p: "Клиенты возвращаются туда, где сохранены их списки и маршруты. Переход к конкуренту = потеря всей истории. Это работает как программа лояльности без карт и скидок."
        card3_title: "Управление товарами"
        card3_p: "Добавляйте товары через административную панель: наименование, цена и расположение на карте. Настройте AI-контекст магазина: органика, оптовый склад, спортпит — что угодно."
        card4_title: "Загрузка карт магазина"
        card4_p: "Загружайте интерактивные планы торговых залов. Покупатели сразу видят актуальную схему и могут ориентироваться в вашем магазине. Маршруты строятся через A* — как в GPS."
        card5_title: "Аналитика маршрутов"
        card5_p: "Отслеживайте популярные маршруты покупателей, статистику расходов, частоту визитов. Узнайте, какие зоны посещают чаще — и оптимизируйте выкладку на основе реальных данных."
        card6_title: "Подборки работают на вас"
        card6_p: "Пользователи создают личные подборки товаров в вашем магазине. Это значит, что они планируют возвращаться. Подборки = готовые списки покупок, которые хранятся только у вас."
    footer:
        copy: "&copy; %year% EasyShop Project. Сделано профессионально."

footer:
    rights: "Все права защищены"

