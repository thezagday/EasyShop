services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    image: easyshop-php:dev
    volumes:
      - .:/app:cached
      - vendor:/app/vendor
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-secret}
      DATABASE_URL: ${DATABASE_URL}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
      ADMIN_HOST: ${ADMIN_HOST:-}
      MAIN_HOST: ${MAIN_HOST:-}
      LANDING_HOST: ${LANDING_HOST:-}
      APP_SCHEME: ${APP_SCHEME:-http}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-}
      VAR_DUMPER_SERVER: ${VAR_DUMPER_SERVER:-host.docker.internal:9912}
      MAILER_DSN: null://null

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      target: dev
    image: easyshop-nginx:dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/app:cached

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
      target: dev
    image: easyshop-node:dev
    container_name: easyshop-node
    working_dir: /app
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - .:/app:cached
      - node_modules:/app/node_modules
    command: sh -c "yarn config set registry https://registry.npmjs.org && yarn install && yarn watch"
    networks:
      - easyshop

volumes:
  vendor:
  node_modules:
